title: BlastCAD Docs
description: Official documentation for BlastCAD — a modern, browser-based CAD tool.
theme: just-the-docs

url: https://docs.blastcad.com

aux_links:
  BlastCAD.com: https://blastcad.com

# Footer content
footer_content: "Copyright &copy; 2024 BlastCAD. Distributed under the <a href=\"https://opensource.org/licenses/MIT\">MIT License.</a>"

# Color scheme
color_scheme: light

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Navigation
nav_sort: case_insensitive

# Callouts
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# Back to top
back_to_top: true
back_to_top_text: "Back to top"

plugins:
  - jekyll-seo-tag
